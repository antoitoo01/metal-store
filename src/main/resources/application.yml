server:
  port: 8080

spring:
  application:
    name: metal-store
  profiles:
    active: prod

  jpa:
    hibernate:
      ddl-auto: update

  servlet:
    multipart:
      max-file-size: 5MB

cors:
  allowed-origins: "*"

rate-limiting:
  default-limit: 100
  default-window-seconds: 60
  excluded-paths: /api/health

app:
  storage:
    bucket-name: catalog-images
    upload-dir: uploads

supabase:
  url: ${SUPABASE_URL:}
  publishable-key: ${SUPABASE_PUBLISHABLE_KEY:}
  secret-key: ${SUPABASE_SECRET_KEY:}
