server:
  address: 127.0.0.1

spring:
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.jdbc.batch_size: 100
      hibernate.order_inserts: true
      hibernate.order_updates: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://metalstore.duckdns.org}

logging:
  level:
    com.blacksmith.metalstore: INFO
    org.springframework.security: WARN

app:
  invitation:
    base-url: ${INVITATION_BASE_URL:https://metalstore.duckdns.org}
  seed:
    catalog:
      enabled: false
  storage:
    bucket-name: catalog-images

