spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  devtools:
    restart:
      enabled: true
      additional-paths: build/classes/kotlin
      poll-interval: 1s
      quiet-period: 400ms

app:
  storage:
    upload-dir: uploads
