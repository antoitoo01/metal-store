spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:metal_store
    username: sa
    password:

  jpa:
    show-sql: true
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
    open-in-view: false

app:
  storage:
    upload-dir: uploads
